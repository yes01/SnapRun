name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-macos:
    name: Build ${{ matrix.arch }} release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            arch: arm64
          - runner: macos-13
            arch: x86_64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Swift 6
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"

      - name: Show Swift toolchain
        run: swift --version

      - name: Run tests
        run: swift test

      - name: Package macOS app
        run: bash ./scripts/package-macos.sh "${{ steps.version.outputs.value }}" .release-artifacts

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SnapRun-${{ steps.version.outputs.value }}-${{ matrix.arch }}
          path: .release-artifacts/*.dmg
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build-macos
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: SnapRun-*
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
