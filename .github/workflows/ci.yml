name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  macos:
    name: Test and package macOS
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode toolchain
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode and Swift toolchain
        run: |
          xcodebuild -version
          xcrun swift --version

      - name: Run tests
        run: xcrun swift test

      - name: Package macOS app
        run: bash ./scripts/package-macos.sh 0.0.0-ci .ci-artifacts

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ runner.arch }}-artifacts
          path: .ci-artifacts
          if-no-files-found: error
